# docker-compose.yml — Schulbibliothek (mit Fehlern für Analyse-Aufgabe)
#
# ACHTUNG: Diese Datei enthält absichtlich zwei typische Fehler:
#   1. Hartcodierte Zugangsdaten (Passwörter direkt im YAML)
#   2. Fehlende Startreihenfolge mit Health-Check (Backend startet vor DB)
#
# Diese Datei dient als Analysebeispiel für Aufgabe 3.

# ============================================================
# FEHLERHAFTE VERSION (Prüfungsaufgabe: Fehler identifizieren)
# ============================================================

services:

  postgres:
    image: postgres:16
    container_name: bibliothek-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bibliothek
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SuperGeheim123!
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: bibliothek-backend:latest
    container_name: bibliothek-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bibliothek
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: SuperGeheim123!  
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8180/auth
   

  frontend-benutzer:
    image: bibliothek-frontend-user:latest
    container_name: bibliothek-frontend-user
    ports:
      - "3000:80"
    environment:
      API_BASE_URL: http://backend:8080

  frontend-admin:
    image: bibliothek-frontend-admin:latest
    container_name: bibliothek-frontend-admin
    ports:
      - "3001:80"
    environment:
      API_BASE_URL: http://backend:8080

volumes:
  postgres-data:

